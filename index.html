<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChopJaii DIY - Premium Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #ff4d6d; --p2: #ff758c; --gold: #ffeb3b;
            --dark: #1a051d; --glass: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100vw; height: 100vh;
            background: var(--dark);
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            perspective: 1500px;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .mesh-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #1a051d, #4a148c, #2d0a31);
            background-size: 400% 400%; animation: meshMove 15s ease infinite; z-index: -2;
        }
        @keyframes meshMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #stage-box {
            position: relative; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
        }
        .box-main { font-size: 130px; filter: drop-shadow(0 0 30px rgba(255, 77, 109, 0.6)); cursor: pointer; animation: floatBox 3s infinite; }
        @keyframes floatBox { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px) rotate(3deg); } }
        .tap-instruction { margin-top: 20px; color: white; font-size: 1rem; font-weight: 300; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #stage-reveal {
            position: absolute; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; width: 100%; height: 100%; padding: 20px;
        }

        .photo-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .main-png {
            max-width: 95%; max-height: 50vh; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5)) drop-shadow(0 0 50px rgba(255, 77, 109, 0.4));
            animation: springIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes springIn { from { transform: scale(0.5) translateY(50px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .text-card {
            width: 100%; max-width: 340px; padding: 25px 20px; border-radius: 25px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25); text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .client-name { font-size: 1.8rem; font-weight: 600; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255, 77, 109, 0.6); }
        .client-msg { font-size: 1rem; font-weight: 300; color: rgba(255, 255, 255, 0.9); line-height: 1.5; }

        #flash-bang { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; opacity: 0; pointer-events: none; }

        /* Heart Effect */
        .heart-particle {
            position: fixed; bottom: -50px; font-size: 20px; user-select: none;
            pointer-events: none; z-index: 150; animation: floatUpHeart linear forwards;
        }
        @keyframes floatUpHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="mesh-gradient"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="flash-bang"></div>

    <div id="stage-box">
        <div class="gift-wrapper" onclick="startSurprise()">
            <div class="box-main">🎁</div>
        </div>
        <p class="tap-instruction">แตะเพื่อเปิดเซอร์ไพรส์ ✨</p>
    </div>

    <div id="stage-reveal">
        <div class="photo-wrapper">
            <img src="" class="main-png" id="reveal-img">
        </div>
        <div class="text-card">
            <h1 class="client-name" id="display-n"></h1>
            <p class="client-msg" id="display-m"></p>
            <div style="margin-top:15px; font-size: 22px;">✨💖✨</div>
        </div>
        <div style="margin-top: 25px; font-size: 0.65rem; color: rgba(255,255,255,0.3); letter-spacing: 2px; font-weight: 300;">
            CHOPJAII DIY PREMIUM
        </div>
    </div>

    <script>
        // ดึงข้อมูลจาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const nameVal = urlParams.get('n') || "Surprise!";
        const msgVal = urlParams.get('m') || "ขอให้มีความสุขมากๆ นะครับ";
        const imgVal = urlParams.get('i') || "https://via.placeholder.com/300"; // รูปสำรอง

        document.getElementById('display-n').innerText = nameVal;
        document.getElementById('display-m').innerText = msgVal;
        document.getElementById('reveal-img').src = imgVal;

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function startSurprise() {
            const stageBox = document.getElementById('stage-box');
            const stageReveal = document.getElementById('stage-reveal');
            const flash = document.getElementById('flash-bang');

            stageBox.animate([{ transform: 'translate(2px, 2px)' }, { transform: 'translate(-2px, -2px)' }], { duration: 100, iterations: 5 });

            setTimeout(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    stageBox.style.display = 'none'; 
                    stageReveal.style.display = 'flex';
                    stageReveal.style.opacity = '1';
                    flash.style.opacity = '0';
                    flash.style.transition = 'opacity 1.2s ease-out';
                    createFirework(canvas.width / 2, canvas.height / 2);
                    setInterval(spawnHeart, 300);
                }, 100);
            }, 500);
        }

        function spawnHeart() {
            const heart = document.createElement('div');
            const hearts = ['❤️', '💖', '✨', '💕'];
            heart.className = 'heart-particle';
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x; this.y = y; this.color = color; this.velocity = velocity;
                this.alpha = 1; this.friction = 0.96; this.gravity = 0.15;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color;
                ctx.fill(); ctx.restore();
            }
            update() {
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.velocity.y += this.gravity; this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createFirework(x, y) {
            for (let i = 0; i < 85; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 9 + 3;
                particles.push(new Particle(x, y, '#ff4d6d', { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed }));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) { p.update(); p.draw(); }
                else { particles.splice(i, 1); }
            });
        }
        animate();
    </script>
</body>
</html>
