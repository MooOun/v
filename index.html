<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChopJaii DIY - Surprise!</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff0f3; font-family: 'Arial', sans-serif; overflow: hidden; color: #ff4d6d; text-align: center; }
        .heart { position: absolute; font-size: 20px; animation: fly 3s linear infinite; opacity: 0; }
        @keyframes fly { 0% { transform: translateY(100vh) scale(0.5); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        h1 { font-size: 3rem; margin-bottom: 10px; z-index: 10; text-shadow: 2px 2px #fff; }
        p { font-size: 1.5rem; z-index: 10; padding: 0 20px; }
    </style>
</head>
<body>
    <h1 id="nameDisplay">กำลังโหลด...</h1>
    <p id="msgDisplay"></p>
    <div style="font-size: 80px; z-index: 10;">🎁</div>

    <script>
        // --- LOGIC ดึงค่าจาก URL ---
        const params = new URLSearchParams(window.location.search);
        const name = params.get('n') || 'เธอ'; // ใช้ตัวแปร n แทน name เพื่อให้ URL สั้น
        const msg = params.get('m') || 'มีความสุขมากๆ นะครับ'; // ใช้ m แทน msg

        document.getElementById('nameDisplay').innerText = "ถึง... " + name;
        document.getElementById('msgDisplay').innerText = msg;

        // --- ระบบสร้างหัวใจลอย ---
        function createHeart() {
            const h = document.createElement('div');
            h.classList.add('heart');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
